name: Documentation

on:
  push:
    branches: [main, documentation]
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  # Allow manual deploys from the Actions tab
  workflow_dispatch:

permissions:
  contents: read

# Only one Pages deployment at a time; don't cancel a deploy mid-flight
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Sphinx site
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    outputs:
      # "success" only when the Pages site exists (or was just enabled)
      pages_available: ${{ steps.configure.outcome }}
    steps:
      - uses: actions/checkout@v4

      # Tries to enable GitHub Pages (source: GitHub Actions) if the
      # repository doesn't have it switched on yet. The default GITHUB_TOKEN
      # may not be allowed to create the Pages site — in that case this step
      # is skipped (continue-on-error) and Pages must be enabled once by an
      # admin under Settings -> Pages -> Source: GitHub Actions.
      - name: Configure GitHub Pages
        id: configure
        if: github.event_name != 'pull_request'
        continue-on-error: true
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: docs/requirements.txt

      - name: Install dependencies
        run: pip install -r docs/requirements.txt

      - name: Build documentation (warnings are errors)
        run: sphinx-build -W --keep-going -b html docs/source docs/build/html

      # GitHub Pages serves _static/, _images/ etc. only when Jekyll
      # processing is disabled
      - name: Disable Jekyll
        run: touch docs/build/html/.nojekyll

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build/html

  deploy:
    name: Deploy to GitHub Pages
    # Deploy on pushes to main/documentation and manual runs — never on PRs,
    # and only once the repository's GitHub Pages site exists (enable it under
    # Settings -> Pages -> Source: GitHub Actions, then re-run this workflow)
    if: github.event_name != 'pull_request' && needs.build.outputs.pages_available == 'success'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
