name: Documentation

on:
  push:
    branches: [main, documentation]
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  # Allow manual deploys from the Actions tab
  workflow_dispatch:

permissions:
  contents: read

# Only one Pages deployment at a time; don't cancel a deploy mid-flight
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Sphinx site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: docs/requirements.txt

      - name: Install dependencies
        run: pip install -r docs/requirements.txt

      - name: Build documentation (warnings are errors)
        run: sphinx-build -W --keep-going -b html docs/source docs/build/html

      # GitHub Pages serves _static/, _images/ etc. only when Jekyll
      # processing is disabled
      - name: Disable Jekyll
        run: touch docs/build/html/.nojekyll

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build/html

  deploy:
    name: Deploy to GitHub Pages
    # Deploy on pushes to main/documentation and manual runs — never on PRs
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
